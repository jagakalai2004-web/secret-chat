<!DOCTYPE html>
<html>
<head>
<title>Secret Chat</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9ad5,#ffd6f6);
text-align:center;
padding:30px;
}

#login{
background:white;
padding:25px;
border-radius:15px;
width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#chatpage{
display:none;
}

#header{
width:350px;
margin:auto;
background:#ff2e93;
color:white;
padding:10px;
border-radius:15px 15px 0 0;
}

#status{
font-size:12px;
opacity:0.9;
}

#chatbox{
width:350px;
height:320px;
margin:auto;
background:white;
padding:10px;
overflow-y:scroll;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.msg{
max-width:70%;
padding:8px;
margin:5px;
border-radius:10px;
clear:both;
}

.left{
background:#eee;
float:left;
text-align:left;
}

.right{
background:#ff2e93;
color:white;
float:right;
text-align:left;
}

.msg img{
max-width:150px;
border-radius:8px;
margin-top:5px;
}

.controls{
font-size:10px;
margin-top:3px;
}

input{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#ff2e93;
color:white;
cursor:pointer;
}

#typing{
font-size:12px;
height:18px;
}

</style>
</head>

<body>

<div id="login">

<h2>Daily Notes Access</h2>

<input type="password" id="pass" placeholder="Enter password">

<br><br>

<button onclick="check()">Enter</button>

<p id="wrong"></p>

</div>


<div id="chatpage">

<div id="header">

<b>Secret Chat 💬</b>

<div id="status">🟢 Online</div>

</div>

<div id="chatbox"></div>

<div id="typing"></div>

<br>

<input type="text" id="message" placeholder="Type message..." oninput="typing()">

<input type="file" id="img">

<button onclick="send()">Send</button>

<br><br>

<button onclick="deleteAll()">Delete All Chat</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyAP1MzWKRQ0pMCwluBKr5XBE172r3te_lc",
authDomain:"secret-love-chat-76aed.firebaseapp.com",
databaseURL:"https://secret-love-chat-76aed-default-rtdb.firebaseio.com",
projectId:"secret-love-chat-76aed",
storageBucket:"secret-love-chat-76aed.appspot.com",
messagingSenderId:"521543927192",
appId:"1:521543927192:web:cc6c8fe06a4b15260e57ed"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase();

window.check=function(){

var p=document.getElementById("pass").value;

if(p=="0909"){

document.getElementById("login").style.display="none";
document.getElementById("chatpage").style.display="block";

}else{

document.getElementById("wrong").innerHTML="Wrong Password";

}

}

window.send=function(){

var text=document.getElementById("message").value;
var img=document.getElementById("img").files[0];

if(text!="" || img){

if(img){

var reader=new FileReader();

reader.onload=function(e){

push(ref(db,"messages"),{
msg:text,
image:e.target.result,
side:"right"
});

}

reader.readAsDataURL(img);

}else{

push(ref(db,"messages"),{
msg:text,
side:"right"
});

}

document.getElementById("message").value="";
document.getElementById("img").value="";

}

}

window.delmsg=function(id){

remove(ref(db,"messages/"+id));
location.reload();

}

window.editmsg=function(id,old){

var newmsg=prompt("Edit message",old);

if(newmsg!=null){

update(ref(db,"messages/"+id),{
msg:newmsg
});

location.reload();

}

}

window.deleteAll=function(){

remove(ref(db,"messages"));
location.reload();

}

window.typing=function(){

document.getElementById("typing").innerHTML="Typing...";

setTimeout(()=>{
document.getElementById("typing").innerHTML="";
},1500);

}

onChildAdded(ref(db,"messages"), function(data){

var box=document.getElementById("chatbox");

var id=data.key;
var d=data.val();

var div=document.createElement("div");

div.className="msg "+(d.side=="right"?"right":"left");

var html=d.msg || "";

if(d.image){
html+="<br><img src='"+d.image+"'>";
}

html+="<div class='controls'>"+
"<button onclick='editmsg(\""+id+"\",\""+d.msg+"\")'>✏</button>"+
"<button onclick='delmsg(\""+id+"\")'>❌</button>"+
"</div>";

div.innerHTML=html;

box.appendChild(div);

box.scrollTop=box.scrollHeight;

});

</script>

</body>
</html>
