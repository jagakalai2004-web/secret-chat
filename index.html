<!DOCTYPE html>
<html>
<head>
<title>Daily Notes</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9ad5,#ffd6f6);
text-align:center;
padding:40px;
}

#login{
background:white;
padding:30px;
border-radius:15px;
width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#chatpage{
display:none;
}

h1{
color:#ff2e93;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ff2e93;
color:white;
cursor:pointer;
}

#chatbox{
width:320px;
height:300px;
margin:auto;
background:white;
border-radius:15px;
padding:10px;
overflow-y:scroll;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.msg{
background:#ffe0f3;
padding:8px;
margin:5px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login">

<h1>Daily Notes Access</h1>

<p>Enter Access Code</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Enter</button>

<p id="wrong"></p>

</div>

<div id="chatpage">

<h1>Secret Chat ❤️</h1>

<div id="chatbox"></div>

<br><br>

<input type="text" id="message" placeholder="Type message">

<button onclick="send()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAP1MzWKRQ0pMCwluBKr5XBE172r3te_lc",
  authDomain: "secret-love-chat-76aed.firebaseapp.com",
  databaseURL: "https://secret-love-chat-76aed-default-rtdb.firebaseio.com",
  projectId: "secret-love-chat-76aed",
  storageBucket: "secret-love-chat-76aed.firebasestorage.app",
  messagingSenderId: "521543927192",
  appId: "1:521543927192:web:cc6c8fe06a4b15260e57ed"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase();

window.check=function(){

var p=document.getElementById("pass").value;

if(p=="0909"){

document.getElementById("login").style.display="none";
document.getElementById("chatpage").style.display="block";

}else{

document.getElementById("wrong").innerHTML="Wrong Password";

}

}

window.send=function(){

var text=document.getElementById("message").value;

if(text!=""){

push(ref(db,"messages"),{
msg:text
});

document.getElementById("message").value="";

}

}

onChildAdded(ref(db,"messages"), function(data){

var box=document.getElementById("chatbox");

box.innerHTML += "<div class='msg'>"+data.val().msg+"</div>";

box.scrollTop = box.scrollHeight;

});

</script>

</body>
</html>
